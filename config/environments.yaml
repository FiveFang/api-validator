# Multi-environment configuration.
#
# This file is the SINGLE source of truth for base URLs and quality-gate
# thresholds. Test code must never hardcode these values — they are injected
# into tests via the `env` fixture in the top-level conftest.py.
#
# Each environment maps a logical name to:
#   base_url           : root URL the APIClient prepends to every request path
#   max_response_time  : quality gate — every request must complete within this
#                        many seconds (asserted by assert_within_threshold)
#   min_results_count  : minimum number of results a list endpoint must return
#   auth_token_env     : (optional) name of an environment variable holding a
#                        Bearer token. If set, the APIClient sends
#                        "Authorization: Bearer <token>". When the variable is
#                        unset, the suite for that environment is skipped.

environments:
  # REST Countries migrated from the free, no-auth v3.1 API to a key-gated v5
  # API (free tier: 500 req/mo) on the api.restcountries.com host. v3.1 now
  # returns a deprecation stub. Provide a v5 key via the RESTCOUNTRIES_API_KEY
  # env var; without it the countries suite skips so CI stays green. v5 paths:
  # names.common/{name}, region/{region}, and the base for "all" (offset-paged,
  # 25/page). See README "REST Countries v5" for setup.
  countries:
    base_url: https://api.restcountries.com/countries/v5
    auth_token_env: RESTCOUNTRIES_API_KEY
    max_response_time: 2.0
    min_results_count: 1

  weather:
    base_url: https://api.open-meteo.com/v1
    max_response_time: 3.0
    min_results_count: 1
