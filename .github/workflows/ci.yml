name: CI

# Trigger on push to ANY branch, plus PRs.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Run API validation suite
    runs-on: ubuntu-latest

    env:
      # Optional: a valid REST Countries v5 key enables the countries suite.
      # If unset, those tests skip (the pipeline still runs and reports).
      RESTCOUNTRIES_API_KEY: ${{ secrets.RESTCOUNTRIES_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The quality gate (response-time threshold from environments.yaml) is a
      # plain assertion, so a breach fails a test and therefore fails this step
      # and the pipeline. No separate gate logic needed.
      - name: Run tests
        run: |
          mkdir -p reports
          python -m pytest -v \
            --alluredir=allure-results \
            --junitxml=reports/junit.xml

      # Bonus: surface a test summary in the job output.
      - name: Write job summary
        if: always()
        continue-on-error: true
        run: python scripts/ci_summary.py reports/junit.xml >> "$GITHUB_STEP_SUMMARY"

      # Generate a static Allure HTML report (best-effort; never fails the build
      # — the test step above is the gate). Uses the Allure CLI directly rather
      # than a Docker action so job setup can't fail on a missing base image.
      - name: Set up Java for Allure
        if: always()
        continue-on-error: true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate Allure report
        if: always()
        continue-on-error: true
        env:
          ALLURE_VERSION: 2.29.0
        run: |
          curl -fsSL -o allure.tgz \
            "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf allure.tgz
          "allure-${ALLURE_VERSION}/bin/allure" generate allure-results -o allure-report --clean

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: ignore

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit.xml
          if-no-files-found: ignore
